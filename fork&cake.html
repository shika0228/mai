<!DOCTYPE html>
<html lang="CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WORLD-Fork&Cake-</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Emblema+One&family=Noto+Sans+SC:wght@100..900&family=Noto+Serif+SC:wght@200..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/fork.css">
</head>

<body>
    <main class="main" id="main">
        <header class="header" id="header">
            <a class="back-btn" href="index.html">
                <img src="img-fork&cake/icon-fork.webp" alt="返回">
                <p>返回</p>
            </a>
        </header>
        <section class="top" id="top">
            <img class="top-bg" src="img-fork&cake/main-visual-bg.webp">
            <img class="top-bg-sp" src="img-fork&cake/main-visual-bg-sp.webp">
            <img class="top-blood blood-left" src="img-fork&cake/blood-left.webp">
            <img class="top-blood blood-right" src="img-fork&cake/blood-right.webp">
        </section>
        <section class="story" id="story">
            <h2 class="story-title">
                Story
            </h2>
            <p class="story-text">
                高中生小舞加入一个灵异社后，知晓了“fork&cake”的概念，同时，<br>
                她的好友在某一日突然失踪。这件事同时引起了前警察桑克瑞德的注意，<br>
                桑克瑞德一边秘密调查这件事，一边深陷名为“小舞”的泥潭……
            </p>
            <img class="story-cake" src="img-fork&cake/story-cake.webp">
        </section>
        <section class="profile" id="profile">
            <img class="profile-bg" src="img-fork&cake/profile-bg.webp">
            <img class="profile-bg-sp" src="img-fork&cake/profile-bg-sp.webp">
            <div class="profile-content-wrapper">
                <img class="profile-box" id="profile-than" src="img-fork&cake/profile-1.webp" draggable="false">
                <img class="profile-box-sp" id="profile-sp-than" src="img-fork&cake/profile-1-sp.webp" draggable="false">
                <img class="profile-box" id="profile-mai" src="img-fork&cake/profile-2.webp" draggable="false">
                <img class="profile-box-sp" id="profile-sp-mai" src="img-fork&cake/profile-2-sp.webp" draggable="false">
            </div>
        </section>
        <section class="comics" id="comics">
            <h2 class="comics-title">
                Comics
            </h2>
            <img class="comics-pic" src="img-fork&cake/comic-1.webp">
            <img class="comics-pic" src="img-fork&cake/comic-2.webp">
            <img class="comics-pic" src="img-fork&cake/comic-3.webp">
            <img class="comics-pic" src="img-fork&cake/comic-4.webp">
            <img class="comics-pic" src="img-fork&cake/comic-5.webp">
            <img class="comics-pic" src="img-fork&cake/comic-6.webp">
            <h3 class="comics-continue-text">
                つづく…
            </h3>
        </section>
        <footer class="footer" id="footer">
            <img class="footer-img" src="img-fork&cake/footer.webp">
        </footer>
    </main>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js" integrity="sha256-CSXorXvZcTkaix6Yvo6HppcZGetbYMGWSFlBw8HfCJo=" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.10.0/js/lightbox.min.js"></script>
    <script src="js/fork.js"></script>
</body>

</html>
